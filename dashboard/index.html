<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一念清涼 管理儀錶板</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">

  <!-- Dashboard CSS -->
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <!-- 登入遮罩 -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="login-icon">🪷</div>
      <h2 class="login-title">一念清涼 管理儀錶板</h2>
      <p class="login-subtitle">請輸入管理者帳號密碼</p>
      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="login-field">
          <label for="loginUser">帳號</label>
          <input type="text" id="loginUser" placeholder="請輸入帳號" autocomplete="username" required>
        </div>
        <div class="login-field">
          <label for="loginPass">密碼</label>
          <input type="password" id="loginPass" placeholder="請輸入密碼" autocomplete="current-password" required>
        </div>
        <div class="login-error" id="loginError"></div>
        <button type="submit" class="login-btn">登入</button>
      </form>
    </div>
  </div>

  <!-- 頁首 -->
  <header class="dashboard-header" style="display:none;" id="dashboardHeader">
    <div class="header-container">
      <h1 class="header-title">一念清涼 管理儀錶板</h1>
      <a href="../index.html" class="header-link">← 返回主站</a>
    </div>
  </header>

  <!-- 主要容器 -->
  <main class="dashboard-container" style="display:none;" id="dashboardMain">

    <!-- 統計概覽區塊 -->
    <section class="stats-overview">
      <div class="stat-card">
        <div class="stat-label">即時線上人數</div>
        <div class="stat-value" id="online-count">-</div>
        <div class="stat-unit">人</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">今日訪客數</div>
        <div class="stat-value" id="today-sessions">-</div>
        <div class="stat-unit">人</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">總訪客數</div>
        <div class="stat-value" id="total-sessions">-</div>
        <div class="stat-unit">人</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">今日故事閱讀</div>
        <div class="stat-value" id="today-views">-</div>
        <div class="stat-unit">次</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">今日心情回饋</div>
        <div class="stat-value" id="today-feedback">-</div>
        <div class="stat-unit">則</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">今日隨緣一則</div>
        <div class="stat-value" id="today-random">-</div>
        <div class="stat-unit">次</div>
      </div>
    </section>

    <!-- 圖表區塊 -->
    <section class="charts-section">
      <div class="chart-container chart-wide">
        <h2 class="chart-title">故事熱門排行 Top 10</h2>
        <canvas id="story-popularity-chart"></canvas>
        <div class="chart-empty-state" id="story-empty">尚無數據</div>
      </div>

      <div class="chart-container">
        <h2 class="chart-title">情緒標籤分析</h2>
        <canvas id="emotion-tags-chart"></canvas>
        <div class="chart-empty-state" id="emotion-empty">尚無數據</div>
      </div>

      <div class="chart-container">
        <h2 class="chart-title">分享數據</h2>
        <canvas id="share-platforms-chart"></canvas>
        <div class="chart-empty-state" id="share-empty">尚無數據</div>
      </div>

      <div class="chart-container chart-wide">
        <h2 class="chart-title">每日趨勢（過去 30 天）</h2>
        <canvas id="daily-trend-chart"></canvas>
        <div class="chart-empty-state" id="trend-empty">尚無數據</div>
      </div>
    </section>

    <!-- 心情回饋分析區塊 -->
    <section class="charts-section">
      <div class="chart-container">
        <h2 class="chart-title">閱讀後心情回饋</h2>
        <canvas id="feedback-chart"></canvas>
        <div class="chart-empty-state" id="feedback-empty">尚無數據</div>
      </div>

      <div class="chart-container">
        <h2 class="chart-title">故事回饋效果排行</h2>
        <canvas id="story-feedback-chart"></canvas>
        <div class="chart-empty-state" id="story-feedback-empty">尚無數據</div>
      </div>
    </section>

    <!-- 最近用戶輸入區塊 -->
    <section class="recent-inputs-section">
      <h2 class="section-title">最近的心情輸入</h2>
      <div class="table-wrapper">
        <table class="inputs-table">
          <thead>
            <tr>
              <th>時間</th>
              <th>用戶心情輸入</th>
              <th>推薦故事</th>
            </tr>
          </thead>
          <tbody id="recent-inputs-tbody">
            <tr class="empty-row">
              <td colspan="3">尚無數據</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- 頁尾 -->
  <footer class="dashboard-footer" style="display:none;" id="dashboardFooter">
    <p>一念清涼 © 2026 | 資料來源：Firebase Realtime Database</p>
  </footer>

  <!-- Firebase SDK (compat mode for CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Login & Auth -->
  <script>
    const AUTH_USER = 'Admin';
    const AUTH_HASH = 'ea34564517d272f65dadf8347081041d337076b0dff46f72ca2bc3643b6222d4';

    async function sha256(text) {
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('loginUser').value.trim();
      const pass = document.getElementById('loginPass').value;
      const errorEl = document.getElementById('loginError');

      if (user !== AUTH_USER) {
        errorEl.textContent = '帳號或密碼錯誤';
        return false;
      }

      const passHash = await sha256(pass);
      if (passHash !== AUTH_HASH) {
        errorEl.textContent = '帳號或密碼錯誤';
        return false;
      }

      // Auth success
      try { sessionStorage.setItem('yinian_dashboard_auth', 'true'); } catch(e) {}
      showDashboard();
      return false;
    }

    function showDashboard() {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('dashboardHeader').style.display = '';
      document.getElementById('dashboardMain').style.display = '';
      document.getElementById('dashboardFooter').style.display = '';
    }

    // Check if already logged in this session
    try {
      if (sessionStorage.getItem('yinian_dashboard_auth') === 'true') {
        showDashboard();
      }
    } catch(e) {}
  </script>

  <!-- Dashboard JavaScript -->
  <script src="dashboard.js"></script>
</body>
</html>
