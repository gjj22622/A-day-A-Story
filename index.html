</head>
<body>
  <!-- Ambient fireflies -->
  <div class="ambient" id="ambient"></div>

  <!-- SCREEN 1: LANDING -->
  <div class="screen active" id="landing">
    <div class="lotus-icon">🪷</div>
    <h1 class="brand-title">一念清涼</h1>
    <p class="brand-sub">走了半輩子的路<br>這裡有一盞燈</p>
    <button class="enter-btn" onclick="goToMood()">坐下來，聽一則故事</button>
    <p style="margin-top:1.5rem; font-size:0.85rem; color:var(--muted); opacity:0.6;">這些故事，已經陪人走過一千五百年</p>
    <button class="enter-btn-secondary" onclick="goToTreecaveDirect()" style="margin-top:1rem; background:transparent; border:1px solid var(--jade); color:var(--jade); padding:0.7rem 2rem; border-radius:999px; cursor:pointer; font-size:1rem; font-family:'Noto Sans TC',sans-serif; transition:all 0.3s;">🌳 不想聽故事，只想說說話</button>
    <a class="fb-page-btn" href="https://www.facebook.com/onemomentcool" target="_blank" rel="noopener" style="margin-top:1.5rem;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      追蹤粉專
    </a>
  </div>

  <!-- SCREEN 2: MOOD SELECTION -->
  <div class="screen" id="mood-select">
    <div class="mood-header">
      <h2>今天，什麼事在你心裡放不下？</h2>
      <p>說說看，或者選一個最像你的</p>
    </div>
    <div class="mood-input-area">
      <div class="mood-input-wrap">
        <input type="text" class="mood-input" id="moodInput" placeholder="例如：照顧媽媽好累、不知道該不該退休、覺得沒人懂我..." autocomplete="off">
        <button class="mood-submit" onclick="submitMood()">幫我找一則</button>
      </div>
      <p class="ai-hint">✨ 說什麼都可以，這裡聽得懂</p>
      <div class="divider-text">或者，看看下面哪個像你</div>

      <!-- 50+ LIFE SCENE TAGS (redesigned: single group, 10 scene-based phrases) -->
      <div class="tag-section">
        <div class="tag-section-title">你最近，是不是也這樣？</div>
        <div class="mood-tags-grid">
          <button class="mood-tag mood-tag-50plus" data-tags="exhaustion,perseverance,career_failure">撐得好累，但不能倒</button>
          <button class="mood-tag mood-tag-50plus" data-tags="loneliness,resentment,relationship_family">一個人扛，沒人懂</button>
          <button class="mood-tag mood-tag-50plus" data-tags="exhaustion,relationship_family,guilt">照顧家人，快喘不過氣</button>
          <button class="mood-tag mood-tag-50plus" data-tags="confusion,life_decision,present_moment">不知道這樣忙，到底為了什麼</button>
          <button class="mood-tag mood-tag-50plus" data-tags="letting_go,regret,acceptance">有些事，放不下也拿不起</button>
          <button class="mood-tag mood-tag-50plus" data-tags="fear,health_concern,anxiety">對自己的身體，開始害怕</button>
          <button class="mood-tag mood-tag-50plus" data-tags="career_failure,frustration,change_transition">在職場上，覺得自己被推著走</button>
          <button class="mood-tag mood-tag-50plus" data-tags="anger,resentment,frustration">心裡有氣，但說不出口</button>
          <button class="mood-tag mood-tag-50plus" data-tags="peace_seeking,courage_needed,acceptance">想停下來，但不敢</button>
          <button class="mood-tag mood-tag-50plus" data-tags="confusion,life_decision,growth">走了半輩子，然後呢？</button>
        </div>
      </div>

      <button class="seek-btn" id="seekBtn" onclick="submitMood()">🪷 幫你找一則故事</button>

      <div class="random-divider">
        <span class="random-divider-line"></span>
        <span class="random-divider-text">或者</span>
        <span class="random-divider-line"></span>
      </div>
      <button class="random-btn" onclick="randomStory()">🎲 隨緣一則</button>
      <p class="random-hint">不想多說，就讓緣分帶路</p>
    </div>
  </div>

  <!-- SCREEN 3: TRANSITION -->
  <div class="screen" id="transition-screen">
    <div>
      <p class="transition-text" id="transitionText">正在千年智慧中<br>為你尋找一念清涼…</p>
      <div class="transition-lotus">🪷</div>
    </div>
  </div>

  <!-- SCREEN 4: STORY DISPLAY -->
  <div class="screen" id="story-screen">
    <button class="back-btn" onclick="goToMood()">← 換一個</button>
    <div class="story-container" id="storyContainer"></div>
  </div>

  <!-- Firebase SDK (compat mode for CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- Analytics & Social modules -->
  <script src="./js/analytics.js"></script>
  <script src="./js/social.js"></script>

  <!-- Main App -->
  <script src="./js/app.js?v=4.0.0"></script>
</body>
</html>
